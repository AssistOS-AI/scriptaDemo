  <text x="170" y="1982" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#f0e6c8" opacity="0.74"><tspan x="170" dy="0">A civilization of sentient walking plants discovers</tspan><tspan x="170" dy="32">that on a neighboring world, life survives by</tspan><tspan x="170" dy="32">killing. Their absolute ethic has met its first</tspan><tspan x="170" dy="32">contradiction.</tspan></text>
