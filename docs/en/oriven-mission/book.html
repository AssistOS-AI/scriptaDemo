e cloud-cover that had hidden Oriven's surface from observation for millennia, she saw a single bright point on the planet's dark side. The memorial root, its blue-green luminescence glowing against the deepCanopy, facing both Origaya and Oriven, saying: we saw what we are not, and we chose what we are. And we practice again.</p>\n<p>But there was something new in the field of view. On Origaya's surface, near the landing zone, the Fungal Mind had grown its own structure — a bright mycelial network that reached upward, toward the ship, toward the point in the sky where Oriven's sun was just another bright star. Two worlds, two beings, two choices. And between them, a relay that carried not just data, but feeling.</p>\n<p>Mirel spoke into the root-network, her voice carrying the quality of someone who had spent a million years watching and had finally found the words to describe what she saw.</p>\n<p>&quot;They see us. We see them. And neither of us is eating the other.&quot;</p>\n<p>After a million years of watching, that was not a resolution. It was a practice.</p>\n<p>And that was enough.</p>"}],"atlas":{"characters":[{"id":"characters/catalyst","title":"Catalyst","summary":"Introduces pressure, information, or disruption at key turns."},{"id":"characters/counterpart","title":"Counterpart","summary":"Closest ally, foil, guide, or temptation vector."},{"id":"characters/pressure-source","title":"Pressure Source","summary":"Embodies the main coercive, rival, or antagonistic force."},{"id":"characters/protagonist","title":"Protagonist","summary":"Primary lens of action, interpretation, and change."},{"id":"characters/sorne","title":"Sorne","summary":"Sorne is the operative who killed. Not through malice, not through alien contamination, but through the technology that was supposed to preserve life. She made a split-second decision during containment using a resonance cutter, and three partially-fused beings lost coherence and dissolved. Whether this constitutes killing or triage is the question that fractures the civilization. Sorne is not a villain. She is an eight-hundred-year-old security specialist who did exactly what she was trained to do."},{"id":"characters/thalne","title":"Thalne","summary":"Thalne is the bridge. She is the only Oriveni who exists in both states — partially individual, partially connected to the fused beings. Her testimony at the network assembly changes the debate from abstract ethics to concrete experience. She must choose to go deeper into the Fusion to heal it, knowing she might not come back."},{"id":"characters/witness","title":"Witness","summary":"Names what others try to obscure and carries public consequence."}],"places":[{"id":"places/anchor-location","title":"Anchor Location","summary":"Stable or familiar space that establishes the initial order."},{"id":"places/pressure-front","title":"Pressure Front","summary":"Environment where competition, pursuit, or systemic strain intensifies."},{"id":"places/revelation-site","title":"Revelation Site","summary":"Space where the hidden architecture or hidden truth becomes undeniable."},{"id":"places/threshold-location","title":"Threshold Location","summary":"Crossing point where the governing rules become visible."}],"concepts":[{"id":"concepts/governing-premise","title":"Governing Premise","summary":"Central speculative, scientific, or philosophical proposition."},{"id":"concepts/hidden-cost","title":"Hidden Cost","summary":"What the system demands but prefers not to name."},{"id":"concepts/transformative-rule","title":"Transformative Rule","summary":"Condition that allows the ending to feel structurally earned."}],"themes":[{"id":"themes/language-builds-worlds","title":"Language Builds Worlds","summary":"Naming is never merely descriptive when institutions and bodies obey the terms."},{"id":"themes/reciprocity-restrains-power","title":"Reciprocity Restrains Power","summary":"Power without mutual answerability cannot remain humane."},{"id":"themes/witne <script>(function(){
var data=BOOK_DATA;
var strings=data.strings||{};
var app=document.getElementById("app");

function esc(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

var chapters=data.chapters||[];
var atlas=data.atlas||{};
var atlasKeys=["characters","places","concepts","themes","relationships","events","special-objects"];
var hasAtlas=atlasKeys.some(function(k){return atlas[k]&&atlas[k].length});

var chapterEls=[];

function buildNav(){
return '<nav class="book-nav">'
+'<div class="book-nav__brand">'
+'<div class="book-nav__eyebrow">'+esc(strings.bookReader||"Book Reader")+'</div>'
+'<div class="book-nav__title">'+esc(data.title)+'</div>'
+'</div>'
+'<div class="book-nav__controls">'
+'<button class="nav-btn" data-scroll="top">&#8593;</button>'
+'<button class="nav-btn" data-scroll="toc">'+esc(strings.openToc||"Contents")+'</button>'
+'<select class="nav-select" data-jump>'+('<option value="">'+esc(strings.jumpToChapter||"Jump to chapter")+'</option>')
+chapters.map(function(ch,i){return '<option value="ch-'+i+'">'+(i+1)+'. '+esc(ch.title)+'</option>'}).join("")+'</select>'
+'</div>'
+'</nav>';
}

function buildCover(){
return '<section class="section-cover" id="sec-cover">'
+'<img src="'+COVER_SRC+'" alt="'+esc(strings.coverAlt||"cover")+'" loading="eager">'
+'</section>';
}

function buildOpening(){
return '<section class="section-opening" id="sec-opening">'
+'<img src="'+OPENING_SRC+'" alt="'+esc(strings.openingAlt||"opening")+'" loading="eager">'
+'</section>';
}

function buildToc(){
return '<section class="section-toc" id="sec-toc">'
+'<div class="paper-sheet">'
+'<h2>'+esc(strings.tableOfContents||"Table of Contents")+'</h2>'
+'<p class="section-toc__sub">'+esc(data.author||"")+(data.genre?' &middot; '+esc(data.genre):"")+'</p>'
+'<div class="toc-list">'
+chapters.map(function(ch,i){
return '<button class="toc-item" data-scroll="ch-'+i+'">'
+'<span class="toc-item__num">'+(i+1)+'</span>'
+'<span class="toc-item__text"><strong>'+esc(ch.title)+'</strong><span>'+(ch.summary?esc(ch.summary.substring(0,140)):"")+'</span></span>'
+'</button>';
}).join("")
+'</div>'
+'</div>'
+'</section>';
}

function buildAtlas(){
if(!hasAtlas)return "";
var panels=atlasKeys.filter(function(k){return atlas[k]&&atlas[k].length}).map(function(k){
var items=atlas[k].slice(0,4);
var label={characters:"Characters",places:"Places",concepts:"Concepts",themes:"Themes",relationships:"Relationships",events:"Events","special-objects":"Special Objects"}[k]||k;
return '<div class="atlas-panel"><h3>'+esc(label)+'</h3><ul>'
+items.map(function(it){return '<li><strong>'+esc(it.title)+'</strong><span>'+esc((it.summary||"").substring(0,100))+'</span></li>'}).join("")
+'</ul></div>';
}).join("");
return '<section class="section-atlas" id="sec-atlas">'
+'<div class="paper-sheet">'
+'<h2>'+esc(strings.worldOverview||"World Overview")+'</h2>'
+'<p class="section-atlas__sub">'+esc(strings.worldOverviewSub||"")+'</p>'
+'<div class="atlas-grid">'+panels+'</div>'
+'</div>'
+'</section>';
}

function buildChapter(ch,i){
return '<section class="chapter" id="ch-'+i+'">'
+'<div class="paper-sheet">'
+'<div class="chapter__header">'
+'<span class="chapter__number">'+esc(strings.chapter||"Chapter")+' '+(i+1)+'</span>'
+'<h2 class="chapter__title">'+esc(ch.title)+'</h2>'
+(ch.summary?'<p class="chapter__summary">'+esc(ch.summary)+'</p>':"")
+'<div class="chapter__divider"></div>'
+'</div>'
+'<div class="chapter__body">'+ch.html+'</div>'
+'<div class="chapter__footer">'
+'<span>'+esc(strings.chapter||"Chapter")+' '+(i+1)+': '+esc(ch.title)+'</span>'
+'<span></span>'
+'</div>'
+'</div>'
+'</section>';
}

function buildClosing(){
return '<section class="section-closing" id="sec-closing">'
+'<div class="paper-sheet" style="text-align:center">'
+'<h2>'+esc(strings.closingTitle||"End of the Book")+'</h2>'
+'<p>'+esc(strings.closingNote||"Thank you for reading.")+'</p>'
+(data.openingQuote?'<blockquote class="closing-quote">'+esc(data.openingQuote)+'</blockquote>':"")
+'</div>'
+'</section>';
}

var html=buildNav()
+'<div class="app-shell">'
+'<div class="book-content">'
+buildCover()
+buildOpening()
+buildToc()
+buildAtlas();

for(var i=0;i<chapters.length;i++){
html+=buildChapter(chapters[i],i);
}

html+=buildClosing()
+'</div>'
+'</div>';

app.innerHTML=html;

app.querySelector("[data-scroll=top]")&&app.querySelector("[data-scroll=top]").addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"})});
app.querySelector("[data-scroll=toc]")&&app.querySelector("[data-scroll=toc]").addEventListener("click",function(){var el=document.getElementById("sec-toc");if(el)el.scrollIntoView({behavior:"smooth"})});

app.querySelectorAll("[data-scroll]").forEach(function(btn){
if(btn.getAttribute("data-scroll")==="top"||btn.getAttribute("data-scroll")==="toc")return;
btn.addEventListener("click",function(){
var id=btn.getAttribute("data-scroll");
var el=document.getElementById(id);
if(el)el.scrollIntoView({behavior:"smooth"});
});
});

var jumpSel=app.querySelector("[data-jump]");
if(jumpSel){
jumpSel.addEventListener("change",function(){
if(!jumpSel.value)return;
var el=document.getElementById(jumpSel.value);
if(el)el.scrollIntoView({behavior:"smooth"});
jumpSel.value="";
});
}

var currentChapter=0;
var chSections=app.querySelectorAll(".chapter");

function onScroll(){
var scrollY=window.scrollY||window.pageYOffset;
var best=0;
for(var i=0;i<chSections.length;i++){
var top=chSections[i].getBoundingClientRect().top+scrollY;
if(top-200<=scrollY)best=i;
}
currentChapter=best;
}

window.addEventListener("scroll",onScroll,{passive:true});

document.addEventListener("keydown",function(e){
if(e.key==="ArrowDown"||e.key==="ArrowRight"){
var next=currentChapter+1;
if(next<chSections.length){chSections[next].scrollIntoView({behavior:"smooth"});e.preventDefault();}
}else if(e.key==="ArrowUp"||e.key==="ArrowLeft"){
var prev=currentChapter-1;
if(prev>=0){chSections[prev].scrollIntoView({behavior:"smooth"});e.preventDefault();}
}
});
})();</script>
</body>
</html>
