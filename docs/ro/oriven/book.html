 a civilization discovering its deepest certainty was uncertain. They were the grief of a civilization choosing its certainty despite knowing it was not inevitable.</p>\n<p>This was a different kind of grief. A grief that could be lived with. A grief that could grow around, like root-tissue growing around stone.</p>\n<p>Mirel continued to observe Origaya. The Lenses stayed open, the Descender continued to transmit, and Mirel processed each observation with a new understanding — not approval, not acceptance, but comprehension. She watched predators hunt and prey flee and parents care for their young and the whole vast architecture of consumption that made Origaya what it was, and she called it what it was: a world where life was brief and energy was scarce and survival required taking from others, and her calling it by its true name was not complicity but respect.</p>\n<p>Lithos published her analysis with the full weight of her analytical framework. She documented the mathematical efficiency of predation, the thermodynamic constraints of Origaya's orbital position, and the logical conclusion that Origayan behavior was not evil but adapted. She did not argue that Oriveni should adopt Origayan ethics. She argued that Oriveni should understand that their ethics was an adaptation too, and that understanding adaptation was not the same as accepting it.</p>\n<p>Verath maintained his opposition, but he accepted the network's decision to continue observing. He could not suppress what he could not contain, and the knowledge of Origaya had already propagated beyond any single being's ability to recall it. He chose to enforce the ethic — not because it was natural law, but because it was the law the network had chosen.</p>\n<p>And Caelith's probe continued to transmit data, and her signal array remained on the surface, built but not activated, a possibility that had not been realized but had not been removed. The question of communication with Origaya remained open, and Oriveni civilization held it the way it held all open questions: patiently, through root-deliberation that would take seasons, through understandings that would grow rather than be decided.</p>\n<p>In the Central Archive, Aethon did something he had never done before. He extended a new root toward the surface. Not toward the Lenses, not toward the signal array, not toward any instrument of observation or communication. He extended a root toward the layer of stone that lay between the deepCanopy and the Charging Plains, and he began to grow.</p>\n<p>What he was growing was not a signal. It was not a probe. It was not communication in any sense that the deepCanopy would have recognized.</p>\n<p>It was a memorial.</p>\n<p>A living marker, grown from his own archive tissue, that would one day break the surface of the Charging Plains and stand in the full light of the sun that made Oriveni ethics possible. A marker that said: we were here. We saw what we are not. And we chose what we are.</p>\n<p>The root grew slowly, the way everything grew in Oriven. It would take years to reach the surface. It would take decades to become visible. It would take centuries to become what Aethon intended it to be: a thin line of living archive tissue, standing in the light, facing the sky where Origaya was, carrying the memory of a question that had changed everything and a choice that had been made anyway.</p>\n<p>The deepCanopy carried on. The fungal light-gardens glowed. The thermal gardens radiated warmth. The root-connections shared nutrients and information and the background hum of connected life. The grief of knowing what Origaya was had become part of the network, and the network was healing around it, the way a tree heals around a wound: not by removing it, but by growing through it, incorporating it, making it part of the structure.</p>\n<p>In time, the memorial root would reach the surface. In time, Aethon's gesture would be visible to any Oriveni who made the journey to the Charging Plains. In time, the question that had no precedent would become a precedent, and the choice that was made in full knowledge of its contingency would become part of the archive, and four thousand years from now, some other question would arise that had no answer, and some other ancient being would search Aethon's memory and find this choice and know that an ethic chosen despite its conditions is the only ethic worth having.</p>\n<p>But that was in time. In Oriven, time was what things grew in. And the memorial root was growing, and the deepCanopy was healing, and the Lenses were still open, and the Descender was still transmitting, and somewhere on the surface, Caelith's signal array stood built but not activated, a possibility waiting to become a choice.</p>\n<p>And Origaya circled its smaller star, and the beings on its surface killed and feared and cared for their own and consumed others, and the light from that smaller star reached the Lenses on the Charging Plains, and the deepCanopy processed the observation and grieved and chose and continued.</p>\n<p>What grows from witnessing is not the same as what grows without it. It is shaped by what it has seen. It carries the memory of what it has known. It is weaker in some ways and stronger in others, and the question of whether it is better to have witnessed or to have remained ignorant is a question that can only be answered by the being who has witnessed, and who cannot un-witness, and who must choose what to grow from what they have seen.</p>\n<p>Aethon chose to grow. The deepCanopy chose to continue. The ethic chose itself, not because it was universal, but because it was chosen.</p>\n<p>And that was enough.</p>"}],"atlas":{"characters":[{"id":"characters/catalyst","title":"Caelith","summary":"Caelith is a surface-dwelling fire-bloom, nine hundred years old — one of the rare Oriveni who lives near the surface rather than in the deepCanopy. Her body has adapted to intense solar exposure, extreme temperature swings, and the constant danger of the surface environment. She is the architect of the Descender, the probe designed to reach Origaya and return biological data. She believes that understanding demands contact, not just observation."},{"id":"characters/counterpart","title":"Lithos","summary":"Lithos is a canopy-dwelling stratagem-fern, two thousand eight hundred years old, occupying the upper layers of the deepCanopy where filtered light creates complex shadow-patterns she reads like maps. Where others feel horror at Origaya, Lithos sees patterns, efficiencies, evolutionary logic. She is charismatic, unnerving, and essential. Her frond-body can unfurl to catch maximum light or contract into a tight analytical cluster."},{"id":"characters/pressure-source","title":"Verath","summary":"Verath is a root-network sentinel, one thousand five hundred years old, tasked with protecting the deepCanopy's laws and stability. His root-body is primarily subterranean — he experiences the world through root-touch and vibrational sense more than through sight. He represents the institutional voice: Origaya observations are dangerous, the probes should be recalled, the telescopes should be turned away."},{"id":"characters/protagonist","title":"Aethon","summary":"Aethon is a four-thousand-year-old walking tree-sage, the oldest living keeper of the Root Archive — the embodied memory of Oriveni ethical precedent. His trunk-body stands twelve meters tall in the deepCanopy's central cavern, root-tendrils reaching into the network that connects all Oriveni life. He has watched civilizations of root and bark rise and settle. His bark is deeply fissured, his canopy vast, his root-network connections numbering in the millions."},{"id":"characters/witness","title":"Mirel","summary":"Mirel is a young shoot-intellect, barely three centuries old — still supple, still forming, still capable of radical growth-pattern shifts. She operates the Origaya Lenses, the telescope array that first resolved dinosaur predation on Earth. She is the one who first identified hunting behavior in dinosaurs and named it \"rootless consumption\" — killing without nutrient-sharing, without network acknowledgment, without grief. She cannot stop watching Origaya."}],"places":[{"id":"places/anchor-location","title":"The Deep Canopy","summary":"The Deep Canopy is the vast subterranean cavern system where Oriveni civilization truly lives. It extends for hundreds of kilometers beneath Venus's crust, lit by bioluminescent algae and heated by geothermal vents. The Canopy is not a single space but a connected network of caverns, water channels, fungal highways, and root-network junctions."},{"id":"places/pressure-front","title":"The Origaya Observatory","summary":"The Observatory is where Mirel's Origaya Lenses are mounted — a formation on the Charging Plains where gaps in Venus's cloud layer allow telescopic observation of Earth. This is where the first horror was seen, where Mirel first identified dinosaur predation, and where the ethical crisis is most acute."},{"id":"places/revelation-site","title":"The Probe Chamber","summary":"A specialized cavern near the surface where Caelith designed and constructed the Descender — the probe sent toward Origaya. It serves as both laboratory and moral battleground, the place where theory becomes action and where the debate over contact vs. observation becomes most acute."},{"id":"places/threshold-location","title":"The Charging Plains","summary":"The Charging Plains are Venus's surface — a landscape of extremes. Scorched by daytime temperatures that would vaporize animal life, frozen at night, bombarded by solar radiation. For Oriveni, the surface is a necessary danger: they must make brief forays upward to charge their energy reserves in direct sunlight."}],"concepts":[{"id":"concepts/governing-premise","title":"Oriveni Consciousness","summary":"Oriveni consciousness operates on principles fundamentally different from animal minds:"},{"id":"concepts/hidden-cost","title":"The Predation Paradox","summary":"The central conceptual challenge of the book:"},{"id":"concepts/transformative-rule","title":"Solar-Thermal Technology","summary":"Oriveni technology is not forged or manufactured — it is grown. Everything they build is biological, crystalline, or mineral in origin, cultivated over long periods through directed growth and root-network engineering."}],"themes":[{"id":"themes/grief-organized-into-rule","title":"Horror at Predation","summary":"When the Oriveni first resolved dinosaur behavior on Origaya through the Lenses, the root-network experienced a collective shock that rippled through every connected being. What they saw was not merely death — Oriveni understand death. What they saw was **rootless consumption**: one living being ending another not for network balance or shared necessity, but for individual survival. Eating flesh. Tearing. Swallowing. No root-sharing. No grief acknowledgment. No return of nutrients through the network."},{"id":"themes/horror-at-predation","title":"Horror at Predation","summary":"When the Oriveni first resolved dinosaur behavior on Origaya through the Lenses, the root-network experienced a collective shock that rippled through every connected being. What they saw was not merely death — Oriveni understand death. What they saw was **rootless consumption**: one living being ending another not for network balance or shared necessity, but for individual survival. Eating flesh. Tearing. Swallowing. No root-sharing. No grief acknowledgment. No return of nutrients through the network."},{"id":"themes/language-builds-worlds","title":"Long Thinking vs. Short Violence","summary":"Oriveni think across millennia. Their debates last decades. Their buildings grow over centuries. An individual decision — whether to change root-network protocols, whether to open a new cavern — can take seasons of shared deliberation."},{"id":"themes/long-thinking-vs-short-violence","title":"Long Thinking vs. Short Violence","summary":"Oriveni think across millennia. Their debates last decades. Their buildings grow over centuries. An individual decision can take seasons of shared deliberation through the root-network."},{"id":"themes/reciprocity-restrains-power","title":"Root-Shared Ethics","summary":"On Oriven, the ethical prohibition against killing is not merely philosophical — it is biological. The root-network that connects all Oriveni life creates a shared experience of harm. When one Oriveni is damaged, the network feels it. When one dies, the network grieves through root-tremors that propagate across the entire deepCanopy."},{"id":"themes/root-shared-ethics","title":"Root-Shared Ethics","summary":"On Oriven, the ethical prohibition against killing is not merely philosophical — it is biological. The root-network that connects all Oriveni life creates a shared experience of harm. When one Oriveni is damaged, the network feels it. When one dies, the network grieves through root-tremors that propagate across the entire deepCanopy."}],"mechanics":[],"emotions":[{"id":"emotions/character-emotional-arcs","title":"Character Emotional Arcs","summary":"- **Start**: Deep contentment, the quiet confidence of four thousand years of unbroken precedent - **Midpoint**: Silent crisis — no precedent, no guidance, the archive empty when it is needed most - **End**: Renewed commitment, but conscious rather than assumed. Ethics chosen despite knowledge of its contingency"}],"relationships":[{"id":"relationships/counterpart-and-witness","title":"Mirel and Caelith","summary":"Mirel documents Origaya through observation. Caelith wants to reach it directly. Mirel's careful data becomes Caelith's justification for contact. They need each other — Mirel's legitimacy gives Caelith's transgression intellectual cover, and Caelith's boldness gives Mirel's observation a sense of direction."},{"id":"relationships/protagonist-and-counterpart","title":"Aethon and Lithos","summary":"Aethon needs Lithos's analytical clarity. Lithos needs Aethon's ethical authority. Their alliance is built on mutual utility — Aethon provides the legitimacy of four millennia of precedent; Lithos provides the intellectual framework that can process Origaya data without collapsing into grief."},{"id":"relationships/protagonist-and-pressure-source","title":"Aethon and Verath","summary":"Verath was once Aethon's student in the deep root-protocols. Their relationship carries the weight of a mentor who has seen his student become the enforcer of the very principles the mentor now questions."}],"plot-elements":[{"id":"plot-elements/engineered-misunderstanding","title":"The Ethical Quarrel","summary":"The formal root-network assembly where Lithos argues for understanding predation, Verath demands suppression, and Aethon must choose what Oriveni ethics means when its biological foundation is questioned. This is the book's central debate — not abstract philosophy but living argument between beings who share each other's feelings through root-connections."},{"id":"plot-elements/hidden-jurisdiction","title":"Probe Descent","summary":"Caelith's launch of the Descender probe toward Origaya. This is the first deliberate physical contact with a predatory world. It is a heresy against caution, a breach of protocol, and an act of intellectual courage — or recklessness, depending on who in the network you ask._VERATH_OBJECTION and the formal root-network debate that follows define the Second Act."},{"id":"plot-elements/ritual-bargain","title":"The Charging Crisis","summary":"When Aethon surfaces for solar charging and confronts the raw intensity of Venus's sunlight, he experiences firsthand why Oriveni can afford not to kill — abundant energy makes patience possible. This intuition is the seed of doubt: if ethics is a luxury of abundance, what happens when abundance is questioned?"},{"id":"plot-elements/sabotage-at-ceremony","title":"First Light from Origaya","summary":"The moment Mirel's telescopes resolve dinosaur behavior on Origaya. This is the inciting incident of the entire book — the first time Oriveni see life killing life. The observation ripples through the root-network like a disease, and nothing can contain it."}],"special-objects":[{"id":"special-objects/portable-shrine","title":"The Origaya Lenses","summary":"The Origaya Lenses are crystalline optical arrays grown over centuries by Mirel and her predecessors. They are mounted on the Observatory Shelf on the Charging Plains, positioned where gaps in Venus's cloud layer allow observation of Earth."},{"id":"special-objects/seed-vault","title":"The Descender","summary":"The Descender is Caelith's probe — a biological-crystalline construct designed to survive atmospheric transit from Venus to Earth and return data. It is the first Oriveni-made object sent beyond their own atmosphere."},{"id":"special-objects/witness-compass","title":"The Root Archive","summary":"Aethon's four-thousand-year-old tree-body is not just a living organism — it is the living memory of Oriveni civilization. Every precedent, every ethical decision, every crisis and resolution is encoded in its tissue. When Aethon searches for guidance, he does not consult a text — he grows toward the relevant precedent, feeling it rise through his root-structure like a memory returning to consciousness."}],"events":[{"id":"events/ambush-in-transit","title":"Ambush In Transit","summary":"Movement becomes the site of vulnerability."},{"id":"events/bargain-under-pressure","title":"Bargain Under Pressure","summary":"A deal clarifies desire, fear, and leverage at once."},{"id":"events/betrayal-disclosed","title":"Betrayal Disclosed","summary":"Trust is reinterpreted through new knowledge."},{"id":"events/inciting-disturbance","title":"Inciting Disturbance","summary":"The world stops pretending to be stable."},{"id":"events/moral-argument","title":"Moral Argument","summary":"The book's thesis is fought for in live relational terms."},{"id":"events/return-under-new-law","title":"Return Under New Law","summary":"The ending shows the world changed in structure, not only feeling."},{"id":"events/revelation-of-cost","title":"Revelation Of Cost","summary":"A promised good becomes ethically expensive."},{"id":"events/sacrifice-or-renunciation","title":"Sacrifice Or Renunciation","summary":"A character gives up leverage to remain whole."}]},"strings":{"tableOfContents":"Cuprins","chapter":"Capitolul","page":"Pagina","of":"din","previous":"Anterior","next":"Următor","closeToc":"Închide","openToc":"Cuprins","jumpToChapter":"Sari la capitol","bookReader":"Cititor de carte","closingTitle":"Sfârșitul cărții","closingNote":"Vă mulțumim pentru lectură.","worldOverview":"Privire de ansamblu","worldOverviewSub":"Personaje, locuri și concepte din această carte.","detailsNote":"Specificațiile complete sunt disponible prin materialele sursă.","coverAlt":"copertă","openingAlt":"pagină de deschidere"}};var COVER_SRC="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNjAwIDI0MDAiIHJvbGU9ImltZyIgYXJpYS1sYWJlbD0iT3JpdmVuOiBPcmlnaW5zIGNvdmVyIHBhZ2UiPgoKICA8ZGVmcz4KICAgIDxsaW5lYXJHcmFkaWVudCBpZD0iYmciIHgxPSIwIiB5MT0iMCIgeDI9IjEiIHkyPSIxIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3RvcC1jb2xvcj0iIzFhMGYwNyIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjQyJSIgc3RvcC1jb2xvcj0iIzJkNGExZSIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiNjNDdhMmMiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgICA8cmFkaWFsR3JhZGllbnQgaWQ9Imdsb3ciIGN4PSI1NCUiIGN5PSIzOCUiIHI9IjU4JSI+CiAgICAgIDxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiNlOGY1YTMiIHN0b3Atb3BhY2l0eT0iMC44NCIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjU1JSIgc3RvcC1jb2xvcj0iIzdkYjg1YSIgc3RvcC1vcGFjaXR5PSIwLjI2Ii8+CiAgICAgIDxzdG9wIG9mZnNldD0iMTAwJSIgc3RvcC1jb2xvcj0iIzdkYjg1YSIgc3RvcC1vcGFjaXR5PSIwIi8+CiAgICA8L3JhZGlhbEdyYWRpZW50PgogICAgPGxpbmVhckdyYWRpZW50IGlkPSJmb2lsIiB4MT0iMCIgeTE9IjAiIHgyPSIxIiB5Mj0iMSI+CiAgICAgIDxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiNmMGU2YzgiLz4KICAgICAgPHN0b3Agb2Zmc2V0P <script>(function(){
var data=BOOK_DATA;
var strings=data.strings||{};
var app=document.getElementById("app");

function esc(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

var chapters=data.chapters||[];
var atlas=data.atlas||{};
var atlasKeys=["characters","places","concepts","themes","relationships","events","special-objects"];
var hasAtlas=atlasKeys.some(function(k){return atlas[k]&&atlas[k].length});

var chapterEls=[];

function buildNav(){
return '<nav class="book-nav">'
+'<div class="book-nav__brand">'
+'<div class="book-nav__eyebrow">'+esc(strings.bookReader||"Book Reader")+'</div>'
+'<div class="book-nav__title">'+esc(data.title)+'</div>'
+'</div>'
+'<div class="book-nav__controls">'
+'<button class="nav-btn" data-scroll="top">&#8593;</button>'
+'<button class="nav-btn" data-scroll="toc">'+esc(strings.openToc||"Contents")+'</button>'
+'<select class="nav-select" data-jump>'+('<option value="">'+esc(strings.jumpToChapter||"Jump to chapter")+'</option>')
+chapters.map(function(ch,i){return '<option value="ch-'+i+'">'+(i+1)+'. '+esc(ch.title)+'</option>'}).join("")+'</select>'
+'</div>'
+'</nav>';
}

function buildCover(){
return '<section class="section-cover" id="sec-cover">'
+'<img src="'+COVER_SRC+'" alt="'+esc(strings.coverAlt||"cover")+'" loading="eager">'
+'</section>';
}

function buildOpening(){
return '<section class="section-opening" id="sec-opening">'
+'<img src="'+OPENING_SRC+'" alt="'+esc(strings.openingAlt||"opening")+'" loading="eager">'
+'</section>';
}

function buildToc(){
return '<section class="section-toc" id="sec-toc">'
+'<div class="paper-sheet">'
+'<h2>'+esc(strings.tableOfContents||"Table of Contents")+'</h2>'
+'<p class="section-toc__sub">'+esc(data.author||"")+(data.genre?' &middot; '+esc(data.genre):"")+'</p>'
+'<div class="toc-list">'
+chapters.map(function(ch,i){
return '<button class="toc-item" data-scroll="ch-'+i+'">'
+'<span class="toc-item__num">'+(i+1)+'</span>'
+'<span class="toc-item__text"><strong>'+esc(ch.title)+'</strong><span>'+(ch.summary?esc(ch.summary.substring(0,140)):"")+'</span></span>'
+'</button>';
}).join("")
+'</div>'
+'</div>'
+'</section>';
}

function buildAtlas(){
if(!hasAtlas)return "";
var panels=atlasKeys.filter(function(k){return atlas[k]&&atlas[k].length}).map(function(k){
var items=atlas[k].slice(0,4);
var label={characters:"Characters",places:"Places",concepts:"Concepts",themes:"Themes",relationships:"Relationships",events:"Events","special-objects":"Special Objects"}[k]||k;
return '<div class="atlas-panel"><h3>'+esc(label)+'</h3><ul>'
+items.map(function(it){return '<li><strong>'+esc(it.title)+'</strong><span>'+esc((it.summary||"").substring(0,100))+'</span></li>'}).join("")
+'</ul></div>';
}).join("");
return '<section class="section-atlas" id="sec-atlas">'
+'<div class="paper-sheet">'
+'<h2>'+esc(strings.worldOverview||"World Overview")+'</h2>'
+'<p class="section-atlas__sub">'+esc(strings.worldOverviewSub||"")+'</p>'
+'<div class="atlas-grid">'+panels+'</div>'
+'</div>'
+'</section>';
}

function buildChapter(ch,i){
return '<section class="chapter" id="ch-'+i+'">'
+'<div class="paper-sheet">'
+'<div class="chapter__header">'
+'<span class="chapter__number">'+esc(strings.chapter||"Chapter")+' '+(i+1)+'</span>'
+'<h2 class="chapter__title">'+esc(ch.title)+'</h2>'
+(ch.summary?'<p class="chapter__summary">'+esc(ch.summary)+'</p>':"")
+'<div class="chapter__divider"></div>'
+'</div>'
+'<div class="chapter__body">'+ch.html+'</div>'
+'<div class="chapter__footer">'
+'<span>'+esc(strings.chapter||"Chapter")+' '+(i+1)+': '+esc(ch.title)+'</span>'
+'<span></span>'
+'</div>'
+'</div>'
+'</section>';
}

function buildClosing(){
return '<section class="section-closing" id="sec-closing">'
+'<div class="paper-sheet" style="text-align:center">'
+'<h2>'+esc(strings.closingTitle||"End of the Book")+'</h2>'
+'<p>'+esc(strings.closingNote||"Thank you for reading.")+'</p>'
+(data.openingQuote?'<blockquote class="closing-quote">'+esc(data.openingQuote)+'</blockquote>':"")
+'</div>'
+'</section>';
}

var html=buildNav()
+'<div class="app-shell">'
+'<div class="book-content">'
+buildCover()
+buildOpening()
+buildToc()
+buildAtlas();

for(var i=0;i<chapters.length;i++){
html+=buildChapter(chapters[i],i);
}

html+=buildClosing()
+'</div>'
+'</div>';

app.innerHTML=html;

app.querySelector("[data-scroll=top]")&&app.querySelector("[data-scroll=top]").addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"})});
app.querySelector("[data-scroll=toc]")&&app.querySelector("[data-scroll=toc]").addEventListener("click",function(){var el=document.getElementById("sec-toc");if(el)el.scrollIntoView({behavior:"smooth"})});

app.querySelectorAll("[data-scroll]").forEach(function(btn){
if(btn.getAttribute("data-scroll")==="top"||btn.getAttribute("data-scroll")==="toc")return;
btn.addEventListener("click",function(){
var id=btn.getAttribute("data-scroll");
var el=document.getElementById(id);
if(el)el.scrollIntoView({behavior:"smooth"});
});
});

var jumpSel=app.querySelector("[data-jump]");
if(jumpSel){
jumpSel.addEventListener("change",function(){
if(!jumpSel.value)return;
var el=document.getElementById(jumpSel.value);
if(el)el.scrollIntoView({behavior:"smooth"});
jumpSel.value="";
});
}

var currentChapter=0;
var chSections=app.querySelectorAll(".chapter");

function onScroll(){
var scrollY=window.scrollY||window.pageYOffset;
var best=0;
for(var i=0;i<chSections.length;i++){
var top=chSections[i].getBoundingClientRect().top+scrollY;
if(top-200<=scrollY)best=i;
}
currentChapter=best;
}

window.addEventListener("scroll",onScroll,{passive:true});

document.addEventListener("keydown",function(e){
if(e.key==="ArrowDown"||e.key==="ArrowRight"){
var next=currentChapter+1;
if(next<chSections.length){chSections[next].scrollIntoView({behavior:"smooth"});e.preventDefault();}
}else if(e.key==="ArrowUp"||e.key==="ArrowLeft"){
var prev=currentChapter-1;
if(prev>=0){chSections[prev].scrollIntoView({behavior:"smooth"});e.preventDefault();}
}
});
})();</script>
</body>
</html>
